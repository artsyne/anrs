name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install jsonschema pyyaml

      - name: Validate JSON files
        run: |
          echo "Validating JSON syntax..."
          find . -name "*.json" -type f | while read file; do
            python -m json.tool "$file" > /dev/null && echo "✓ $file" || exit 1
          done

      - name: Validate state.json against schema
        run: |
          python -c "
          import json
          from jsonschema import validate

          with open('ai/state/state.schema.json') as f:
              schema = json.load(f)

          with open('ai/state/state.json') as f:
              state = json.load(f)

          validate(instance=state, schema=schema)
          print('✓ ai/state/state.json is valid')
          "

      - name: Validate skills registry against schema
        run: |
          python -c "
          import json
          from jsonschema import validate

          with open('ai/contracts/skill_registry.schema.json') as f:
              schema = json.load(f)

          with open('ai/skills/index.json') as f:
              registry = json.load(f)

          validate(instance=registry, schema=schema)
          print('✓ ai/skills/index.json is valid')
          "

      - name: Verify skill directories exist
        run: |
          python -c "
          import json
          import os

          with open('ai/skills/index.json') as f:
              registry = json.load(f)

          errors = []
          for category, data in registry['skills'].items():
              for skill in data['items']:
                  skill_path = os.path.join('ai/skills', skill['path'])
                  skill_md = os.path.join(skill_path, 'SKILL.md')
                  if not os.path.isdir(skill_path):
                      errors.append(f'Missing directory: {skill_path}')
                  elif not os.path.isfile(skill_md):
                      errors.append(f'Missing SKILL.md: {skill_md}')

          if errors:
              for e in errors:
                  print(f'✗ {e}')
              exit(1)
          else:
              print(f'✓ All {registry["metadata"]["total_skills"]} skill directories verified')
          "

      - name: Check Markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          config-file: ".github/mlc_config.json"
        continue-on-error: true

  shell-check:
    name: Shell Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./scripts"
        continue-on-error: true
